[workspace]
authors = ["chengxuewen <1398831004@qq.com>"]
name = "AUDEBase"
channels = ["conda-forge"]
platforms = ["osx-64", "osx-arm64", "linux-64", "linux-aarch64"]
version = "0.1.0"

[dependencies]
nodejs = ">=22.22.0,<23"
python = "3.12.*"
pip = ">=24.0"
pnpm = "10.32.*"

# --- Features (composable dependency groups) ---

# Runtime: minimal production dependencies
[feature.runtime.dependencies]
# nodejs inherited from base [dependencies]; runtime only needs JS runtime

# Development: build, lint, format tools, local database services
[feature.dev.dependencies]
# Local PostgreSQL + Redis for dev (replaces Docker Compose)
postgresql = ">=16,<19"
redis-server = ">=7,<9"

[feature.dev.tasks]
lint = "pnpm run lint"
format = "pnpm run format"
check = "pnpm run check"

# Test: test runners and frameworks (Phase 1a Week 0 installs these via npm)
[feature.test.dependencies]
# No additional conda deps — vitest/playwright handled by npm

[feature.test.tasks]
test = "pnpm run test"
test-unit = "pnpm run test:unit"
test-e2e = "pnpm run test:e2e"
coverage = "pnpm run test:coverage"

# --- Environments ---

# Minimal: nodejs only (production)
[environments]
runtime = { features = ["runtime"] }
dev = { features = ["runtime", "dev"] }
# default: everything (dev + test)
default = { features = ["runtime", "dev", "test"] }

# --- Global tasks (available in all environments) ---
[tasks]
pack = "scripts/deploy-pack.py --env runtime"
pack-dev = "scripts/deploy-pack.py --env dev"
pack-full = "scripts/deploy-pack.py --env default"
unpack = "scripts/deploy-unpack.py"
archive = "scripts/archive-source.sh"
# Database & service management (replaces Docker Compose)
db-init = "scripts/pixi-services.sh init-db"
db-start = "scripts/pixi-services.sh start-db"
db-stop = "scripts/pixi-services.sh stop-db"
redis-start = "scripts/pixi-services.sh start-redis"
redis-stop = "scripts/pixi-services.sh stop-redis"
services-start = "scripts/pixi-services.sh start-all"
services-stop = "scripts/pixi-services.sh stop-all"
services-status = "scripts/pixi-services.sh status"
