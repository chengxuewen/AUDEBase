name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: audebase
          POSTGRES_PASSWORD: audebase_test
          POSTGRES_DB: audebase_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build
      - run: pnpm --filter @audebase/core exec aude db:migrate
        env:
          DATABASE_URL: postgresql://audebase:audebase_test@localhost:5432/audebase_test

      - run: npx playwright install --with-deps chromium

      - run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://audebase:audebase_test@localhost:5432/audebase_test
          REDIS_URL: redis://localhost:6379
          AUDE_JWT_SECRET: ci-e2e-test-jwt-secret-at-least-32-chars-long
          AUDE_PORT: '5110'

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
